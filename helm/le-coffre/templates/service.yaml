# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "le-coffre.fullname" . }}-backend
  labels:
    {{- include "le-coffre.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "le-coffre.backend.selectorLabels" . | nindent 4 }}
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "le-coffre.fullname" . }}-frontend
  labels:
    {{- include "le-coffre.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "le-coffre.frontend.selectorLabels" . | nindent 4 }}
