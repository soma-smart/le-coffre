apiVersion: v1
kind: Service
metadata:
  name: {{ include "le-coffre.backend.fullname" . }}
  labels:
    {{- include "le-coffre.backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "le-coffre.backend.selectorLabels" . | nindent 4 }}
