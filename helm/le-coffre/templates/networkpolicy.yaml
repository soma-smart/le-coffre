{{- if .Values.networkPolicy.enabled }}
---
# Backend NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "le-coffre.fullname" . }}-backend
  labels:
    {{- include "le-coffre.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "le-coffre.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: {{ .Release.Namespace }}
      ports:
      - protocol: TCP
        port: 8000
  egress:
    # Allow DNS
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 53
      - protocol: UDP
        port: 53
    # Allow database access
    {{- if .Values.postgresql.enabled }}
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: postgresql
      ports:
      - protocol: TCP
        port: 5432
    {{- end }}
    # Allow external database
    {{- if not .Values.postgresql.enabled }}
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 5432
    {{- end }}

---
# Frontend NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "le-coffre.fullname" . }}-frontend
  labels:
    {{- include "le-coffre.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "le-coffre.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: {{ .Release.Namespace }}
      ports:
      - protocol: TCP
        port: 8080
  egress:
    # Allow DNS
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 53
      - protocol: UDP
        port: 53
{{- end }}
