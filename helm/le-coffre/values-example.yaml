# Example production values for Le Coffre
# Copy this file and customize for your environment

image:
  repository: rg.fr-par.scw.cloud/soma-smart-cr/le-coffre
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

# Provide credentials to pull from private registry
imagePullSecrets:
  - name: regcred

replicaCount: 2

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    # Max body size for uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: le-coffre.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: le-coffre-tls
      hosts:
        - le-coffre.yourdomain.com

config:
  environment: production

  # Database configuration
  # DATABASE_URL is managed via external Kubernetes secret for security
  # Create the secret before deploying:
  #
  # For Scaleway Managed PostgreSQL:
  # kubectl create secret generic le-coffre-db \
  #   --from-literal=DATABASE_URL="postgresql://user:password@instance-id.rdb.fr-par.scw.cloud:port/database" \
  #   -n le-coffre
  #
  # Note: URL-encode special characters in password using:
  # python3 -c "import urllib.parse; print(urllib.parse.quote('your_password', safe=''))"

  # JWT configuration
  # JWT_SECRET_KEY is managed via Kubernetes secret for security
  # Create the secret before deploying:
  #
  # JWT_SECRET=$(openssl rand -base64 32)
  # kubectl create secret generic le-coffre \
  #   --from-literal=JWT_SECRET_KEY="$JWT_SECRET" \
  #   -n le-coffre
  #
  # Or pass via --set during helm upgrade:
  # helm upgrade --set config.jwt.secretKey="$JWT_SECRET" ...
  jwt:
    algorithm: "HS256"
    accessTokenExpirationMinutes: 15
    refreshTokenExpirationDays: 7

  # Application base URL - used for SSO callbacks
  appBaseUrl: "https://le-coffre.yourdomain.com"

# Resource allocation
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

# Auto-scaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# For SQLite (NOT recommended for production)
# Only use for testing/development
persistence:
  enabled: false
  storageClass: "scw-bssd"
  accessMode: ReadWriteOnce
  size: 1Gi

# If you want to deploy PostgreSQL with the chart
# Not recommended - use Scaleway Managed Database instead
postgresql:
  enabled: false
  auth:
    username: lecoffre
    password: changeme
    database: lecoffre
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "scw-bssd"

# Security contexts
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

