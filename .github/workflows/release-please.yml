name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          skip-github-release: true

      # Output release PR information
      - name: Release PR info
        if: ${{ steps.release.outputs.pr }}
        run: |
          echo "📝 Release PR created/updated: ${{ steps.release.outputs.pr }}"
          echo "📦 Version will be: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          echo "ℹ️  Merge the PR to automatically create the GitHub release with CHANGELOG content"
