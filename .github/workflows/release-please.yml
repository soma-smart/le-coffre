name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          release-type: simple
          skip-github-release: false

      # Output release PR information
      - name: Release PR info
        if: ${{ steps.release.outputs.pr }}
        run: |
          echo "📝 Release PR created/updated successfully!"
          echo "ℹ️  Merge the PR to automatically create the GitHub release with CHANGELOG content"
