name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'feature/add-ci-cd'  # TEMPORARY: Remove after testing
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write

    env:
      PROJECT_NAME: le-coffre
      DOCKER_CONTAINER_REGISTRY: ${{ secrets.DOCKER_CONTAINER_REGISTRY }}
    outputs:
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Display Workflow Information
        run: |
          echo "🔍 Workflow Information:"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🔄 Event: ${{ github.event_name }}"
          echo "🔀 Reference: ${{ github.ref }}"
          echo "📝 SHA: ${{ github.sha }}"
          echo "📦 Project: ${{ env.PROJECT_NAME }}"
          echo "🗄️ Container Registry: ${{ env.DOCKER_CONTAINER_REGISTRY }}"

      - name: Login to Scaleway Container Registry
        run: |
          echo "🔐 Logging into Scaleway Container Registry..."
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login ${{ env.DOCKER_CONTAINER_REGISTRY }} -u nologin --password-stdin
          echo "✅ Successfully logged in to Scaleway Container Registry"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6.17.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:buildcache,mode=max
          platforms: linux/amd64
          no-cache: false

      - name: Set outputs
        id: set_outputs
        run: |
          echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "✅ Image built and pushed with tag: ${{ github.ref_name }}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
