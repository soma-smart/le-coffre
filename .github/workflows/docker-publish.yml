name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: le-coffre
      CONTAINER_REGISTRY: ${{ needs.setup.outputs.container_registry }}
    outputs:
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Login to Azure
        uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: ${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:latest
          cache-to: type=inline
          no-cache: false
          
      - name: Tag image as latest
        run: |
          docker pull ${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.sha }}
          docker tag ${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.sha }} ${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:latest
          docker push ${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:latest
          
      - name: Set outputs
        id: set_outputs
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
