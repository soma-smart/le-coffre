name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'main'
      - 'feature/add-ci-cd'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read

    env:
      PROJECT_NAME: le-coffre
      DOCKER_CONTAINER_REGISTRY: ${{ secrets.DOCKER_CONTAINER_REGISTRY }}
    outputs:
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
      sha_short: ${{ steps.set_outputs.outputs.sha_short }}
      branch_name: ${{ steps.set_outputs.outputs.branch_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Display Workflow Information
        run: |
          echo "🔍 Workflow Information:"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🔄 Event: ${{ github.event_name }}"
          echo "🔀 Reference: ${{ github.ref }}"
          echo "📝 SHA: ${{ github.sha }}"
          echo "📦 Project: ${{ env.PROJECT_NAME }}"
          echo "🗄️ Container Registry: ${{ env.DOCKER_CONTAINER_REGISTRY }}"

      - name: Login to Scaleway Container Registry
        run: |
          echo "🔐 Logging into Scaleway Container Registry..."
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login ${{ env.DOCKER_CONTAINER_REGISTRY }} -u nologin --password-stdin
          echo "✅ Successfully logged in to Scaleway Container Registry"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value={{branch}}-latest,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6.17.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:buildcache,mode=max
          platforms: linux/amd64
          no-cache: false

      - name: Set outputs
        id: set_outputs
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH_NAME="${{ github.ref_name }}"

          # Normalize branch name for Docker tags (replace / with -)
          NORMALIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')

          # Determine the image tag based on ref type
          if [ "${{ github.ref_type }}" == "tag" ]; then
            IMAGE_TAG="${{ github.ref_name }}"
          else
            IMAGE_TAG="${NORMALIZED_BRANCH}-${SHA_SHORT}"
          fi

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          echo "✅ Image built and pushed with tag: ${IMAGE_TAG}"
          echo "📝 Short SHA: ${SHA_SHORT}"
          echo "🔀 Branch: ${BRANCH_NAME}"

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v7.3.1
        id: grype
        with:
          image: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ steps.set_outputs.outputs.image_tag }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif

      - name: Display Grype scan summary
        if: always()
        run: |
          echo "📊 Vulnerability Scan Summary:"
          echo "Scan completed for image: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ steps.set_outputs.outputs.image_tag }}"
          echo "Detailed results available in artifacts"

      - name: Upload Grype scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-results-${{ steps.set_outputs.outputs.image_tag }}
          path: ${{ steps.grype.outputs.sarif }}
          retention-days: 30
