name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: le-coffre
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_CONTAINER_REGISTRY: ${{ secrets.DOCKER_CONTAINER_REGISTRY }}
    outputs:
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
          registry: ${{ env.DOCKER_CONTAINER_REGISTRY }}
          # Note: The registry is optional. If not provided, it defaults to Docker Hub.

      - name: Build and push image
        uses: docker/build-push-action@v6.17.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.ref_name }}
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}:latest
          cache-to: type=inline
          no-cache: false

      - name: Set outputs
        id: set_outputs
        run: |
          echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
