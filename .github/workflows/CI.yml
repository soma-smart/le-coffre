name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  front-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --frozen-lockfile --prefer-offline

      - name: Run Linting
        run: npm run lint

      - name: Check Dependencies Security
        run: npm audit --audit-level=high

      - name: Type Checking
        if: (${{ success() }} || ${{ failure() }})
        run: npm run typecheck

      - name: Run Unit Tests
        if: (${{ success() }} || ${{ failure() }})
        run: npm run test:unit

      - name: Build Project
        if: (${{ success() }} || ${{ failure() }})
        run: npm run build

  back-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        working-directory: server/
        run: |
          pip install uv
          uv sync --frozen --no-cache

      - name: Run Unit Tests
        working-directory: server/
        run: uv run pytest
