name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  front-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend/
        run: bun install --frozen-lockfile

      - name: Run Linting
        working-directory: frontend/
        run: bunx eslint .

      - name: Check Formatting
        working-directory: frontend/
        run: bunx prettier --check src/

      - name: Check Dependencies Security
        working-directory: frontend/
        run: bun audit --audit-level=moderate

      - name: Run Unit Tests
        if: success() || failure()
        working-directory: frontend/
        run: bunx vitest run

      - name: Type Checking
        if: success() || failure()
        working-directory: frontend/
        run: bun run type-check

      - name: Build Project
        if: success() || failure()
        working-directory: frontend/
        run: bun run build

  back-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "server/uv.lock"

      - name: Install dependencies
        working-directory: server/
        run: uv sync --frozen

      - name: Check Alembic Migrations
        working-directory: server/
        run: |
          # First, upgrade the database to the current head
          uv run alembic upgrade head

          # Generate a new migration to check if schema is in sync
          uv run alembic revision --autogenerate -m "CI check" > /tmp/migration_output.txt

          # Get the generated migration file
          MIGRATION_FILE=$(ls -t alembic/versions/*.py | head -1)

          # Check if the migration contains any actual changes
          # A migration with no changes will only have the boilerplate code
          if grep -q "op.create_table\|op.drop_table\|op.add_column\|op.drop_column\|op.alter_column\|op.create_index\|op.drop_index\|op.create_constraint\|op.drop_constraint" "$MIGRATION_FILE"; then
            echo "❌ ERROR: Database schema is not in sync with migrations!"
            echo "The following migration file was generated:"
            cat "$MIGRATION_FILE"
            echo ""
            echo "Please create a new Alembic migration for your schema changes:"
            echo "  cd server"
            echo "  uv run alembic revision --autogenerate -m 'Your migration description'"
            exit 1
          else
            echo "✅ Database schema is in sync with migrations"
          fi

          # Clean up the generated migration file
          rm "$MIGRATION_FILE"

      - name: Check Dependencies Security
        working-directory: server/
        run: |
          uv export --format requirements-txt --no-hashes > /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt

      - name: Run Unit Tests
        if: success() || failure()
        working-directory: server/
        run: uv run pytest -n auto

  openapi-sync-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "server/uv.lock"

      - name: Install Python dependencies
        working-directory: server/
        run: uv sync --frozen

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend/
        run: bun install --frozen-lockfile

      - name: Start FastAPI server
        working-directory: server/
        run: |
          # Start FastAPI in background
          uv run fastapi dev src/main.py --host 0.0.0.0 --port 8000 &
          FASTAPI_PID=$!
          echo "FASTAPI_PID=$FASTAPI_PID" >> $GITHUB_ENV
          echo "FastAPI started with PID: $FASTAPI_PID"

          # Wait for the server to be ready
          echo "Waiting for FastAPI to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/docs > /dev/null 2>&1; then
              echo "✅ FastAPI is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ FastAPI failed to start in time"
              exit 1
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Check OpenAPI client sync
        working-directory: frontend/
        run: |
          # Generate the OpenAPI client
          echo "Generating OpenAPI client..."
          bun run openapi-ts

          # Check if any files changed
          if [ -n "$(git status --porcelain src/client)" ]; then
            echo "❌ ERROR: OpenAPI client is out of sync!"
            echo ""
            echo "The following files have changes:"
            git status --short src/client
            echo ""
            echo "Diff:"
            git diff src/client
            echo ""
            echo "Please regenerate the OpenAPI client and commit the changes:"
            echo "  1. Make sure the backend is running: cd server && uv run fastapi dev src/main.py"
            echo "  2. Generate the client: cd frontend && bun run openapi-ts"
            echo "  3. Commit the changes: git add frontend/src/client && git commit"
            exit 1
          else
            echo "✅ OpenAPI client is in sync"
          fi

      - name: Stop FastAPI server
        if: always()
        run: |
          if [ -n "$FASTAPI_PID" ]; then
            kill $FASTAPI_PID 2>/dev/null || true
          fi
