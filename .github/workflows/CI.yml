name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  front-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: frontend/
        run: bun install --frozen-lockfile

      - name: Run Linting
        working-directory: frontend/
        run: bun run lint

      - name: Check Dependencies Security
        working-directory: frontend/
        run: bun audit --audit-level=moderate

      - name: Type Checking
        if: (${{ success() }} || ${{ failure() }})
        working-directory: frontend/
        run: bun run type-check

      - name: Build Project
        if: (${{ success() }} || ${{ failure() }})
        working-directory: frontend/
        run: bun run build

  back-ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        working-directory: server/
        run: |
          pip install uv
          uv sync --frozen --no-cache

      - name: Run Unit Tests
        working-directory: server/
        run: uv run pytest -n auto

  trigger-cd:
    name: Trigger CD Pipeline
    runs-on: ubuntu-latest
    needs: [front-ci, back-ci]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger deployment workflow
        run: |
          echo "🚀 Triggering CD pipeline for deployment..."
          curl -L -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CD_TRIGGER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/soma-smart/le-coffre-deployment/dispatches \
            -d '{"event_type":"ci-success","client_payload":{"source_ref":"${{ github.sha }}","branch":"${{ github.ref_name }}","commit_message":"${{ github.event.head_commit.message }}","author":"${{ github.event.head_commit.author.name }}"}}'
          echo "✅ CD pipeline triggered successfully"
