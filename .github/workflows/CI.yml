name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --frozen-lockfile --prefer-offline

      - name: Run Linting
        run: npm run lint

      - name: Check Dependencies Security
        run: npm audit --audit-level=high

      - name: Type Checking
        if: (${{ success() }} || ${{ failure() }})
        run: npm run typecheck

      - name: Run Unit Tests
        if: (${{ success() }} || ${{ failure() }})
        run: npm run test:unit

      - name: Build Project
        if: (${{ success() }} || ${{ failure() }})
        run: npm run build
