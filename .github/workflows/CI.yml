name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install
        run: npm install --frozen-lockfile --prefer-offline
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: audit
        if: (${{ success() }} || ${{ failure() }})
        run: npm audit
      - name: build
        if: (${{ success() }} || ${{ failure() }})
        run: npm run build
      - name: test
        if: (${{ success() }} || ${{ failure() }})
        run: npm test:self
