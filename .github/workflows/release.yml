name: Build, Push and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: le-coffre
      DOCKER_CONTAINER_REGISTRY: ${{ secrets.DOCKER_CONTAINER_REGISTRY }}

    outputs:
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
      backend_image: ${{ steps.set_outputs.outputs.backend_image }}
      frontend_image: ${{ steps.set_outputs.outputs.frontend_image }}
      backend_image_digest: ${{ steps.backend_build.outputs.digest }}
      frontend_image_digest: ${{ steps.frontend_build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get tag version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📍 Version: ${VERSION}"

      - name: Display Build Information
        run: |
          echo "🔍 Build Information:"
          echo "👤 Actor: ${{ github.actor }}"
          echo "📦 Project: ${{ env.PROJECT_NAME }}"
          echo "🗄️ Registry: ${{ env.DOCKER_CONTAINER_REGISTRY }}"
          echo "📍 Version: ${{ steps.get_version.outputs.version }}"
          echo "📝 SHA: $(git rev-parse HEAD)"

      - name: Login to Container Registry
        run: |
          echo "🔐 Logging into Container Registry..."
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login ${{ env.DOCKER_CONTAINER_REGISTRY }} -u nologin --password-stdin
          echo "✅ Successfully logged in"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set outputs
        id: set_outputs
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          IMAGE_TAG="${VERSION}"
          BACKEND_IMAGE="${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-backend:${IMAGE_TAG}"
          FRONTEND_IMAGE="${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-frontend:${IMAGE_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "backend_image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          echo "frontend_image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT

          echo "✅ Backend image: ${BACKEND_IMAGE}"
          echo "✅ Frontend image: ${FRONTEND_IMAGE}"

      - name: Build and push Backend Docker image
        id: backend_build
        uses: docker/build-push-action@v6.17.0
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-backend:${{ steps.set_outputs.outputs.image_tag }}
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-backend:latest
          cache-from: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-backend:buildcache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Build and push Frontend Docker image
        id: frontend_build
        uses: docker/build-push-action@v6.17.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-frontend:${{ steps.set_outputs.outputs.image_tag }}
            ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-frontend:latest
          cache-from: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.PROJECT_NAME }}-frontend:buildcache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Run Grype vulnerability scanner on Backend
        uses: anchore/scan-action@v7.3.1
        id: grype_backend
        with:
          image: ${{ steps.set_outputs.outputs.backend_image }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif

      - name: Run Grype vulnerability scanner on Frontend
        uses: anchore/scan-action@v7.3.1
        id: grype_frontend
        with:
          image: ${{ steps.set_outputs.outputs.frontend_image }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif

      - name: Upload Backend security scan results
        if: always() && steps.grype_backend.outputs.sarif != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-backend-${{ steps.set_outputs.outputs.image_tag }}
          path: ${{ steps.grype_backend.outputs.sarif }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Frontend security scan results
        if: always() && steps.grype_frontend.outputs.sarif != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-frontend-${{ steps.set_outputs.outputs.image_tag }}
          path: ${{ steps.grype_frontend.outputs.sarif }}
          retention-days: 30
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # Generate changelog from commits
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)" $CURRENT_TAG)
          else
            COMMITS=$(git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..$CURRENT_TAG)
          fi

          # Group by type (feat, fix, etc.)
          FEATURES=$(echo "$COMMITS" | grep -i "^* feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^* fix" || true)
          REFACTOR=$(echo "$COMMITS" | grep -i "^* refactor" || true)
          CHORES=$(echo "$COMMITS" | grep -i "^* chore" || true)
          OTHER=$(echo "$COMMITS" | grep -iv "^* \(feat\|fix\|refactor\|chore\)" || true)

          # Build changelog
          CHANGELOG="# Release $CURRENT_TAG"
          CHANGELOG="$CHANGELOG\n\n## Changes\n"

          if [ -n "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG\n### ✨ Features\n$FEATURES\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="$CHANGELOG\n### 🐛 Bug Fixes\n$FIXES\n"
          fi

          if [ -n "$REFACTOR" ]; then
            CHANGELOG="$CHANGELOG\n### ♻️ Refactoring\n$REFACTOR\n"
          fi

          if [ -n "$CHORES" ]; then
            CHANGELOG="$CHANGELOG\n### 🔧 Chores\n$CHORES\n"
          fi

          if [ -n "$OTHER" ]; then
            CHANGELOG="$CHANGELOG\n### 📝 Other Changes\n$OTHER\n"
          fi

          # Add Docker images section
          CHANGELOG="$CHANGELOG\n\n## 🐳 Docker Images\n\n"
          CHANGELOG="$CHANGELOG### Backend\n"
          CHANGELOG="$CHANGELOG\`\`\`\n"
          CHANGELOG="$CHANGELOG${{ needs.build-and-push.outputs.backend_image }}\n"
          CHANGELOG="$CHANGELOG\`\`\`\n"
          CHANGELOG="$CHANGELOG**Digest**: \`${{ needs.build-and-push.outputs.backend_image_digest }}\`\n\n"
          
          CHANGELOG="$CHANGELOG### Frontend\n"
          CHANGELOG="$CHANGELOG\`\`\`\n"
          CHANGELOG="$CHANGELOG${{ needs.build-and-push.outputs.frontend_image }}\n"
          CHANGELOG="$CHANGELOG\`\`\`\n"
          CHANGELOG="$CHANGELOG**Digest**: \`${{ needs.build-and-push.outputs.frontend_image_digest }}\`\n\n"

          CHANGELOG="$CHANGELOG## 🚀 Quick Deploy\n\n"
          CHANGELOG="$CHANGELOG\`\`\`bash\n"
          CHANGELOG="$CHANGELOG# Pull images\n"
          CHANGELOG="$CHANGELOGdocker pull ${{ needs.build-and-push.outputs.backend_image }}\n"
          CHANGELOG="$CHANGELOGdocker pull ${{ needs.build-and-push.outputs.frontend_image }}\n\n"
          CHANGELOG="$CHANGELOG# Or deploy with Helm\n"
          CHANGELOG="$CHANGELOGhelm upgrade --install le-coffre ./helm/le-coffre \\\\\n"
          CHANGELOG="$CHANGELOG  --set backend.image.tag=${{ needs.build-and-push.outputs.image_tag }} \\\\\n"
          CHANGELOG="$CHANGELOG  --set frontend.image.tag=${{ needs.build-and-push.outputs.image_tag }}\n"
          CHANGELOG="$CHANGELOG\`\`\`\n"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const changelog = `${{ steps.changelog.outputs.changelog }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: changelog,
              draft: false,
              prerelease: false
            });
