name: Create Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set image tag
        id: set_outputs
        run: echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6.17.0
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/le-coffre-backend:${{ steps.set_outputs.outputs.image_tag }}
            ${{ env.REGISTRY }}/le-coffre-backend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/le-coffre-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/le-coffre-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6.17.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/le-coffre-frontend:${{ steps.set_outputs.outputs.image_tag }}
            ${{ env.REGISTRY }}/le-coffre-frontend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/le-coffre-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/le-coffre-frontend:buildcache,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # Generate changelog from commits
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)" $CURRENT_TAG)
          else
            COMMITS=$(git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..$CURRENT_TAG)
          fi

          # Group by type (feat, fix, etc.)
          FEATURES=$(echo "$COMMITS" | grep -i "^* feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^* fix" || true)
          REFACTOR=$(echo "$COMMITS" | grep -i "^* refactor" || true)
          CHORES=$(echo "$COMMITS" | grep -i "^* chore" || true)
          OTHER=$(echo "$COMMITS" | grep -iv "^* \(feat\|fix\|refactor\|chore\)" || true)

          # Build changelog
          CHANGELOG="# Release $CURRENT_TAG"
          CHANGELOG="$CHANGELOG\n\n## Changes\n"

          if [ -n "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG\n### ✨ Features\n$FEATURES\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="$CHANGELOG\n### 🐛 Bug Fixes\n$FIXES\n"
          fi

          if [ -n "$REFACTOR" ]; then
            CHANGELOG="$CHANGELOG\n### ♻️ Refactoring\n$REFACTOR\n"
          fi

          if [ -n "$CHORES" ]; then
            CHANGELOG="$CHANGELOG\n### 🔧 Chores\n$CHORES\n"
          fi

          if [ -n "$OTHER" ]; then
            CHANGELOG="$CHANGELOG\n### 📝 Other Changes\n$OTHER\n"
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const changelog = `${{ steps.changelog.outputs.changelog }}`;

            let existingRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              existingRelease = data;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            if (existingRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                name: `Release ${tag}`,
                body: changelog,
                draft: false,
                prerelease: false,
              });
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Release ${tag}`,
                body: changelog,
                draft: false,
                prerelease: false,
              });
            }
