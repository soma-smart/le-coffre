name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g --force corepack && corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: '**/npm-lock.yaml'
      - name: install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: audit
        if: (${{ success() }} || ${{ failure() }})
        run: npm audit
      - name: test
        if: (${{ success() }} || ${{ failure() }})
        run: npm test:self
