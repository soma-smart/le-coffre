# Configuration for GitHub release automation

changelog:
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🛠 Maintenance
      labels:
        - refactor
        - chore
    - title: 👒 Dependencies
      labels:
        - dependencies
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 🧪 Tests
      labels:
        - test
    - title: 🔧 CI/CD
      labels:
        - ci
        - cd
  sort: DESC # Sort commits in descending order
  template: |
    ## Changes in this release
    {% for category in categories %}
    ### {{ category.title }}
    {% for pull in category.pullRequests %}
    - {{ pull.title }} (by @{{ pull.author.login }})
    {% endfor %}
    {% endfor %}
