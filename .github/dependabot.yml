version: 2
updates:
  # Python/uv dependencies (server)
  - package-ecosystem: uv
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python:uv
    reviewers:
      - vianneybacoup
      - Quentin-L-Inge
      - gmalonga
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Bloquer les major bumps automatiques (risque de breaking changes)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-patch:
        update-types:
          - "patch"
      python-minor:
        update-types:
          - "minor"

  # npm dependencies (frontend)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    reviewers:
      - vianneybacoup
      - Quentin-L-Inge
      - gmalonga
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Bloquer les major bumps automatiques (risque de breaking changes)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-production-patch:
        dependency-type: "production"
        update-types:
          - "patch"
      npm-production-minor:
        dependency-type: "production"
        update-types:
          - "minor"
      npm-dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    reviewers:
      - vianneybacoup
      - Quentin-L-Inge
      - gmalonga
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    reviewers:
      - vianneybacoup
      - Quentin-L-Inge
      - gmalonga
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Bloquer les major bumps automatiques (risque de breaking changes)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      docker-patch:
        update-types:
          - "patch"
      docker-minor:
        update-types:
          - "minor"
