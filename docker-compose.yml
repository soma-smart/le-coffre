services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - .env

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8123:80"
    volumes:
      - ./nginx-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
