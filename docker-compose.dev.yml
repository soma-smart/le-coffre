services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: devuser
    volumes:
      - .:/app
      - /app/frontend/node_modules
      - /app/server/.venv
    ports:
      - "8000:8000"  # Backend API (direct access for debugging)
      - "5173:5173"  # Frontend dev server (direct access for debugging)
      - "8123:8123"  # Nginx reverse proxy (main access point)
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    environment:
      - PYTHONPATH=/app/server/src
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
    command: tail -f /dev/null
