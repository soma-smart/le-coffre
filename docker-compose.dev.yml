services:
  reverse-proxy:
    image: nginx:alpine
    volumes:
      - ./.devcontainer/proxy/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8123:8123"
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: uv run fastapi dev src/main.py --host 0.0.0.0
    volumes:
      - ./:/app
    expose:
      - "8000"
    develop:
      watch:
        - action: sync
          path: ./server/app
          target: /app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: bun dev --host 0.0.0.0
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    expose:
      - "5173"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app/frontend
          ignore:
            - node_modules/
