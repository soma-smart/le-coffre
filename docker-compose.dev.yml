version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: uv run fastapi dev src/main.py --host 0.0.0.0
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./server/app
          target: /app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: bun dev
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
