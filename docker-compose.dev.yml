services:
  backend:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /app/server
    volumes:
      - ./server:/app/server
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/server/src
    env_file:
      - path: .env
        required: false
      - path: server/.env
        required: false
    command: >
      bash -c "uv sync && uv run uvicorn src.main:app
               --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: oven/bun:1
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    command: bash -c "([ -d node_modules ] || bun install) && bun run dev"
    depends_on:
      - backend
