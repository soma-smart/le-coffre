repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--config, server/pyproject.toml]
        files: ^server/
      - id: ruff-format
        args: [--config, server/pyproject.toml]
        files: ^server/

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Frontend clean-architecture dependency rule. Shares its script with
  # the front-ci job in .github/workflows/CI.yml — single source of truth.
  - repo: local
    hooks:
      - id: frontend-architecture-check
        name: Enforce frontend clean-architecture dependency rule
        language: script
        entry: frontend/scripts/check-architecture.sh
        files: ^frontend/src/
        pass_filenames: false
