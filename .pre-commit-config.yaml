repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # No --config: ruff auto-discovers server/pyproject.toml by walking up
      # from each file. With --config, ruff anchors project_root to the cwd
      # (here /app, the repo root) and src/known-first-party detection breaks,
      # so identical files produce different I001 verdicts depending on whether
      # ruff was invoked from /app/server (devcontainer) or /app (pre-commit).
      - id: ruff
        files: ^server/
      - id: ruff-format
        files: ^server/

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
